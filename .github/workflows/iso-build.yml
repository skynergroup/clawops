name: build-iso

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'iso/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/iso-build.yml'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso p7zip-full rsync curl

      - name: Build ISO
        run: |
          make fetch-base
          make build
          make checksum
          make verify

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawops-iso
          path: |
            out/*.iso
            out/*.sha256
